<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta http-equiv="X-UA-Compatible" content="ie=edge" />
		<link rel="stylesheet" href="./style/style.css" />
		<title>Form</title>
	</head>
	<body>
		<main>
			<section class="hero-section">
				<div class="logo-section">
					<img src="./assets/images/odin-lined.png" alt="TOP logo" />
					<span class="logo-name">ODIN</span>
				</div>
				<p>
					Photo by
					<a href="https://unsplash.com/@i_am_vitality">Vitalii Kyktov</a> on
					<a href="https://unsplash.com/">Unsplash</a>
				</p>
			</section>

			<section class="form-section">
				<div class="upper-section">
					<p class="form-heading">
						Create your account to get started. Join us and access tools
						designed to help you stay organized, connected, and in control.
					</p>
					<p>It only takes a minute.</p>
				</div>

				<form>
					<fieldset>
						<legend>Sign Up</legend>
						<div class="form-row">
							<div>
								<label for="first-name">FIRST NAME</label>
								<input
									type="text"
									name="firstName"
									id="first-name"
									placeholder="John" />
							</div>
							<div>
								<label for="last-name">LAST NAME</label>
								<input
									type="text"
									name="lastName"
									id="last-name"
									placeholder="Doe" />
							</div>
						</div>

						<div class="form-row">
							<div>
								<label for="email">EMAIL</label>
								<input
									type="email"
									name="email"
									id="email"
									placeholder="JohnDoe@gmail.com" />
							</div>
							<div>
								<label for="phone-num">PHONE NUMBER</label>
								<input
									type="tel"
									name="phoneNum"
									id="phone-num"
									placeholder="09xxxxxxxxx" />
							</div>
						</div>

						<div class="form-row">
							<div>
								<label for="password">PASSWORD</label>
								<input type="password" name="password" id="password" required />
							</div>
							<div>
								<label for="confirm-password">CONFIRM PASSWORD</label>
								<input
									type="password"
									name="confirm-password"
									id="confirm-password"
									required />
							</div>
						</div>
					</fieldset>

					<button type="submit">Create Account</button>
				</form>

				<p class="login-link">
					Already have an account?
					<a href="#">Log in</a>
				</p>
			</section>
		</main>
	</body>
</html>
